<section class="hero-section">
  <!-- Tech Grid Background Pattern -->
  <div class="tech-grid-bg"></div>

  <!-- Ambient glowing orbs -->
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>
  <div class="glow-orb glow-orb-3"></div>

  <div class="hero-container">
    <!-- Content -->
    <div class="hero-content">
      <div class="hero-header-group">
        <h2 class="hero-greeting">{{ t.t("hero.greeting") }}</h2>

        <h1 class="hero-name">{{ t.t("hero.name") }}</h1>
      </div>

      <!-- Static role display replacing the typewriter -->
      <div class="hero-role-container">
        <span class="hero-role-prefix">I am a</span>
        <span class="hero-role-text">{{ t.t("hero.role") }}</span>
      </div>

      <!-- Tagline with sub-bullet points -->
      <div class="hero-tagline-container">
        <p class="hero-tagline-title">{{ t.t("hero.tagline_prefix") }}</p>
        <ul class="hero-tagline-bullets">
          <li>
            <span class="bullet-dot bullet-dot-1"></span>
            <span class="bullet-text">{{ t.t("hero.tagline_web") }}</span>
          </li>
          <li>
            <span class="bullet-dot bullet-dot-2"></span>
            <span class="bullet-text">{{ t.t("hero.tagline_mobile") }}</span>
          </li>
          <li>
            <span class="bullet-dot bullet-dot-3"></span>
            <span class="bullet-text">{{ t.t("hero.tagline_cloud") }}</span>
          </li>
        </ul>
        <p class="hero-location-text">
          <i class="fa-solid fa-location-dot location-icon"></i>
          <span>{{ t.t("hero.location") }}</span>
        </p>
      </div>
    </div>

    <!-- Hero Graphic (hidden on mobile) -->
    <div class="hero-graphic">
      <!-- Glow backing for orbit -->
      <div class="orbit-glow-backing"></div>

      <!-- Concentric Orbits Graphic -->
      <div class="orbit-wrapper">
        <!-- Inner avatar container with premium details -->
        <div class="avatar-container group">
          <div class="avatar-gradient-overlay"></div>
          <span class="avatar-initials">NA</span>
          <!-- Dynamic neon orbit aura ring -->
          <div class="avatar-neon-ring"></div>
        </div>

        <!-- Orbit 1 (Angular) -->
        <div class="orbit-ring orbit-ring-1">
          <div class="orbit-dot orbit-dot-angular">
            <i class="fa-brands fa-angular" title="Angular"></i>
          </div>
        </div>

        <!-- Orbit 2 (AWS) -->
        <div class="orbit-ring orbit-ring-2">
          <div class="orbit-dot orbit-dot-aws">
            <i class="fa-brands fa-aws" title="AWS"></i>
          </div>
        </div>

        <!-- Orbit 3 (Flutter) -->
        <div class="orbit-ring orbit-ring-3">
          <div class="orbit-dot orbit-dot-flutter">
            <i class="fa-brands fa-flutter" title="Flutter"></i>
          </div>
        </div>

        <!-- Orbit 4 (Node.js) -->
        <div class="orbit-ring orbit-ring-4">
          <div class="orbit-dot orbit-dot-node">
            <i class="fa-brands fa-node-js" title="Node.js"></i>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
