<section class="skills-section">
  <div class="skills-container">

    <div class="skills-header reveal">
      <span class="label-tag-primary">{{ t.t('skills.section_label') }}</span>
      <h2 class="skills-title">
        {{ t.t('skills.title') }}
      </h2>
      <p class="skills-subtitle">{{ t.t('skills.subtitle') }}</p>
    </div>

    <div class="skills-grid">
      @for (cat of categories; track cat; let i = $index) {
        <div
          class="skill-card glass-card reveal"
          [class.delay-1]="(i % 4) === 0"
          [class.delay-2]="(i % 4) === 1"
          [class.delay-3]="(i % 4) === 2"
          [class.delay-4]="(i % 4) === 3">
          <div class="card-header">
            <div class="icon-wrapper">
              <i class="fa-solid" [ngClass]="cat.icon"></i>
            </div>
            <h3 class="skill-category-title">{{ t.t('skills.' + cat.key) }}</h3>
          </div>
          <div class="badge-container">
            @for (skill of cat.skills; track skill) {
              <span class="tech-badge">{{ skill }}</span>
            }
          </div>
        </div>
      }
    </div>

  </div>
</section>
