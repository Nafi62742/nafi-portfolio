<section class="relative min-h-screen flex flex-col justify-center overflow-hidden pt-[72px] transition-colors duration-500"
         [style.background]="'var(--hero-bg)'"
         [style.color]="'var(--hero-text)'">

  <!-- Tech Grid Background Pattern -->
  <div class="absolute inset-0 pointer-events-none opacity-[0.05] dark:opacity-[0.08]"
       style="background-image: radial-gradient(var(--text-muted) 1px, transparent 1px); background-size: 24px 24px;"></div>

  <!-- Ambient glowing orbs -->
  <div class="absolute pointer-events-none w-[600px] h-[600px] rounded-full -top-[150px] -left-[150px] blur-[80px]"
       style="background: radial-gradient(circle, var(--orb-color-1) 0%, transparent 70%); animation: orbDrift 14s ease-in-out infinite"></div>
  <div class="absolute pointer-events-none w-[500px] h-[500px] rounded-full top-[25%] -right-[200px] blur-[80px]"
       style="background: radial-gradient(circle, var(--orb-color-2) 0%, transparent 70%); animation: orbDrift 14s ease-in-out infinite 4s"></div>
  <div class="absolute pointer-events-none w-[400px] h-[400px] rounded-full -bottom-[100px] left-[25%] blur-[80px]"
       style="background: radial-gradient(circle, var(--orb-color-3) 0%, transparent 70%); animation: orbDrift 14s ease-in-out infinite 8s"></div>

  <div class="w-full max-w-[1200px] mx-auto px-6 lg:px-8 grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-16 items-center py-20 relative z-10">

    <!-- Content -->
    <div class="flex flex-col gap-6 lg:col-span-7">

      <!-- Available Badge -->
      <div class="animate-fade-up delay-1 inline-flex items-center gap-2.5 px-6 py-2 rounded-full w-fit text-sm font-semibold tracking-wide text-success backdrop-blur-md"
           style="background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.05);">
        <span class="relative flex h-2.5 w-2.5">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-success opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-success" style="box-shadow: 0 0 8px #10b981"></span>
        </span>
        Available for new opportunities
      </div>

      <div class="flex flex-col gap-2">
        <h2 class="animate-fade-up delay-2 text-base md:text-lg font-bold text-accent uppercase tracking-[0.2em]">
          {{ t.t('hero.greeting') }}
        </h2>

        <h1 class="animate-fade-up delay-3 font-extrabold leading-none tracking-[-0.03em] gradient-text pb-2"
            style="font-size: clamp(2.5rem, 7vw, 5rem); filter: drop-shadow(0 2px 10px rgba(99,102,241,0.15))">
          {{ t.t('hero.name') }}
        </h1>
      </div>

      <!-- Static role display replacing the typewriter -->
      <div class="animate-fade-up delay-4 font-bold text-text-secondary flex flex-wrap items-center gap-2"
           style="font-size: clamp(1.25rem, 3.5vw, 1.875rem)">
        <span class="text-text-muted font-light">I am a</span>
        <span class="text-accent-light font-mono bg-gradient-to-r from-accent-light to-primary-light bg-clip-text text-transparent"
              style="text-shadow: 0 0 20px rgba(6, 182, 212, 0.15);">{{ t.t('hero.role') }}</span>
      </div>

      <p class="animate-fade-up delay-5 text-base md:text-lg text-text-secondary max-w-[540px] leading-[1.8]">
        {{ t.t('hero.tagline') }}
      </p>

      <!-- CTAs with premium hover interactions -->
      <div class="animate-fade-up delay-6 flex flex-wrap gap-4 mt-3">
        <button class="btn-primary flex items-center gap-2 group transition-all duration-300 transform hover:scale-[1.03]" id="hero-cta-projects" (click)="scrollToProjects()">
          <i class="fa-solid fa-rocket group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
          {{ t.t('hero.cta_projects') }}
        </button>
        <button class="btn-outline flex items-center gap-2 transition-all duration-300 transform hover:scale-[1.03]" id="hero-cta-contact" (click)="scrollToContact()">
          <i class="fa-solid fa-envelope"></i>
          {{ t.t('hero.cta_contact') }}
        </button>
        <a href="assets/Nafi_Ahmed_Resume.pdf" class="btn-ghost flex items-center gap-2 transition-all duration-300 transform hover:scale-[1.03]" id="hero-cta-resume" target="_blank" download>
          <i class="fa-solid fa-file-arrow-down animate-bounce" style="animation-duration: 2s"></i>
          {{ t.t('hero.cta_resume') }}
        </a>
      </div>

      <!-- Social Links with glassmorphic cards and hover transitions -->
      <div class="animate-fade-up delay-7 flex items-center gap-3.5 mt-4">
        <a href="https://github.com/Nafi62742" target="_blank" id="social-github" aria-label="GitHub"
           class="flex items-center justify-center w-11 h-11 rounded-full text-text-secondary text-lg transition-all duration-300 hover:-translate-y-1.5 hover:text-white hover:border-accent hover:shadow-[0_0_15px_rgba(99,102,241,0.4)]"
           style="background: var(--social-icon-bg); border: 1px solid var(--social-icon-border)">
          <i class="fa-brands fa-github"></i>
        </a>
        <a href="https://linkedin.com/in/racer007" target="_blank" id="social-linkedin" aria-label="LinkedIn"
           class="flex items-center justify-center w-11 h-11 rounded-full text-text-secondary text-lg transition-all duration-300 hover:-translate-y-1.5 hover:text-white hover:border-accent hover:shadow-[0_0_15px_rgba(99,102,241,0.4)]"
           style="background: var(--social-icon-bg); border: 1px solid var(--social-icon-border)">
          <i class="fa-brands fa-linkedin"></i>
        </a>
        <a href="mailto:nafiahmed318@gmail.com" id="social-email" aria-label="Email"
           (click)="copyEmail('nafiahmed318@gmail.com', $event)"
           class="flex items-center justify-center w-11 h-11 rounded-full text-text-secondary text-lg transition-all duration-300 hover:-translate-y-1.5 hover:text-white hover:border-accent hover:shadow-[0_0_15px_rgba(99,102,241,0.4)]"
           style="background: var(--social-icon-bg); border: 1px solid var(--social-icon-border)">
          <i class="fa-solid fa-envelope"></i>
        </a>

        <!-- Copied Indicator -->
        <span *ngIf="copied()" class="text-xs text-success font-semibold animate-fade-in flex items-center gap-1.5 px-3 py-2 rounded-lg backdrop-blur-md"
              style="background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); box-shadow: 0 4px 12px rgba(16,185,129,0.1)">
          <i class="fa-solid fa-circle-check"></i>
          Copied!
        </span>
      </div>
    </div>

    <!-- Hero Graphic (hidden on mobile) -->
    <div class="hidden lg:flex items-center justify-center lg:col-span-5 animate-fade-up delay-4 relative">
      <!-- Glow backing for orbit -->
      <div class="absolute w-[360px] h-[360px] rounded-full filter blur-[50px] opacity-25 pointer-events-none"
           style="background: radial-gradient(circle, var(--avatar-text-bg) 0%, transparent 70%)"></div>

      <!-- Concentric Orbits Graphic -->
      <div class="relative w-[380px] h-[380px] flex items-center justify-center">
        <!-- Inner avatar container with premium details -->
        <div class="flex items-center justify-center w-[190px] h-[190px] rounded-full border-2 animate-pulse-glow z-10 avatar-bubble relative group overflow-hidden">
          <div class="absolute inset-0 bg-gradient-to-tr from-indigo-500/20 to-cyan-500/20 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
          <span class="text-6xl font-black avatar-text leading-none tracking-tight transform group-hover:scale-105 transition-transform duration-500">NA</span>
          <!-- Dynamic neon orbit aura ring -->
          <div class="absolute inset-1.5 rounded-full border border-dashed border-cyan-500/30 animate-spin" style="animation-duration: 20s"></div>
        </div>

        <!-- Orbit 1 (Angular) -->
        <div class="absolute inset-0 rounded-full orbit-spin-1" style="border: 1px dashed var(--orbit-border)">
          <div class="absolute -top-3.5 left-1/2 -translate-x-1/2 flex items-center justify-center w-8 h-8 rounded-full text-xs font-bold transition-all duration-300 hover:scale-125"
               style="background: var(--orbit-dot-bg); border: 1px solid var(--orbit-border); box-shadow: 0 0 10px rgba(226, 50, 55, 0.4); color: #e23237">
            <i class="fa-brands fa-angular text-base" title="Angular"></i>
          </div>
        </div>

        <!-- Orbit 2 (AWS) -->
        <div class="absolute rounded-full orbit-spin-2" style="inset: 35px; width: 310px; height: 310px; border: 1px dashed var(--orbit-border)">
          <div class="absolute -top-3.5 left-1/2 -translate-x-1/2 flex items-center justify-center w-8 h-8 rounded-full text-xs font-bold transition-all duration-300 hover:scale-125"
               style="background: var(--orbit-dot-bg); border: 1px solid var(--orbit-border); box-shadow: 0 0 10px rgba(255, 153, 0, 0.4); color: #ff9900">
            <i class="fa-brands fa-aws text-base" title="AWS"></i>
          </div>
        </div>

        <!-- Orbit 3 (Flutter) -->
        <div class="absolute rounded-full orbit-spin-3" style="inset: 10px; width: 360px; height: 360px; border: 1px dashed var(--orbit-border)">
          <div class="absolute -top-3.5 left-1/2 -translate-x-1/2 flex items-center justify-center w-8 h-8 rounded-full text-xs font-bold transition-all duration-300 hover:scale-125"
               style="background: var(--orbit-dot-bg); border: 1px solid var(--orbit-border); box-shadow: 0 0 10px rgba(2, 86, 155, 0.4); color: #02569b">
            <i class="fa-brands fa-flutter text-base" title="Flutter"></i>
          </div>
        </div>

        <!-- Orbit 4 (Node.js) -->
        <div class="absolute rounded-full orbit-spin-1" style="inset: 60px; width: 260px; height: 260px; border: 1px dashed var(--orbit-border); animation-duration: 25s">
          <div class="absolute -top-3.5 left-1/2 -translate-x-1/2 flex items-center justify-center w-8 h-8 rounded-full text-xs font-bold transition-all duration-300 hover:scale-125"
               style="background: var(--orbit-dot-bg); border: 1px solid var(--orbit-border); box-shadow: 0 0 10px rgba(104, 160, 99, 0.4); color: #68a063">
            <i class="fa-brands fa-node-js text-base" title="Node.js"></i>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scroll hint -->
  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2.5 text-text-muted text-xs tracking-[0.15em] uppercase bounce-subtle z-10 cursor-pointer"
       (click)="scrollToProjects()">
    <span class="font-medium hover:text-accent transition-colors">{{ t.t('hero.scroll_hint') }}</span>
    <div class="w-[2px] h-12 rounded-full relative overflow-hidden" style="background: rgba(99,102,241,0.15)">
      <div class="absolute top-0 left-0 right-0 h-4 bg-gradient-to-b from-accent to-cyan-400 rounded-full animate-bounce"
           style="animation-duration: 2.2s"></div>
    </div>
  </div>
</section>
