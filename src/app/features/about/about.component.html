<section class="py-24 relative" style="background: var(--bg-surface)">
  <div class="w-full max-w-[1200px] mx-auto px-6 lg:px-8">

    <div class="reveal mb-6">
      <span class="label-tag-accent">{{ t.t('about.section_label') }}</span>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-[3fr_2fr] gap-12 lg:gap-16 items-center mt-4">
      <!-- Text side -->
      <div class="flex flex-col gap-5">
      <h2 class="reveal delay-1 gradient-text font-extrabold leading-[1.2]"
          style="font-size: clamp(1.875rem, 4vw, 2.25rem)">
        {{ t.t('about.title') }}
      </h2>

      <p class="reveal delay-2 leading-[1.8] text-base" style="color: var(--text-secondary)">{{ t.t('about.bio_1') }}</p>
      <p class="reveal delay-3 leading-[1.8] text-base" style="color: var(--text-secondary)">{{ t.t('about.bio_2') }}</p>
      <p class="reveal delay-4 leading-[1.8] text-base" style="color: var(--text-secondary)">{{ t.t('about.bio_3') }}</p>

        <button class="reveal delay-5 btn-primary w-fit" (click)="scroll.scrollTo('contact')" id="about-cta">
          <i class="fa-solid fa-paper-plane"></i>
          Let's Talk
        </button>
      </div>

      <!-- Stats side -->
      <div class="grid grid-cols-2 gap-4">
        <div *ngFor="let stat of stats; let i = index"
             class="glass-card reveal bg-bg-card p-6 text-center cursor-default group"
             [class]="'delay-' + (i + 2)">
          <div class="flex items-center justify-center w-12 h-12 rounded-xl mx-auto mb-3 text-xl text-primary-light transition-transform duration-250 group-hover:scale-110 group-hover:-rotate-[5deg]"
               style="background: rgba(99,102,241,0.12)">
            <i class="fa-solid" [ngClass]="stat.icon"></i>
          </div>
          <div class="text-3xl font-black gradient-text leading-none mb-1">{{ stat.value }}</div>
          <div class="text-xs font-medium uppercase tracking-[0.05em]" style="color: var(--text-muted)">{{ t.t(stat.key) }}</div>
        </div>
      </div>
    </div>

  </div>
</section>
