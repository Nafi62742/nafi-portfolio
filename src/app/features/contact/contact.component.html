<section class="py-24 relative" style="background: var(--bg-surface)">
  <div class="w-full max-w-[1200px] mx-auto px-6 lg:px-8">

    <div class="text-center mb-12 reveal">
      <span class="label-tag-primary">{{ t.t('contact.section_label') }}</span>
      <h2 class="gradient-text font-extrabold mt-4 mb-3" style="font-size: clamp(1.875rem, 4vw, 2.25rem)">
        {{ t.t('contact.title') }}
      </h2>
      <p class="text-text-secondary max-w-[540px] mx-auto">{{ t.t('contact.subtitle') }}</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-[1fr_2fr] gap-8 max-w-[1000px] mx-auto">

      <!-- Info Panel -->
      <div class="reveal delay-1">
        <div class="glass-card bg-bg-card p-6 mb-5 flex flex-col gap-5">
          <div *ngFor="let info of contactInfo" class="flex items-center gap-4">
            <div class="flex items-center justify-center w-11 h-11 rounded-xl flex-shrink-0 text-sm text-primary-light"
                 style="background: rgba(99,102,241,0.12)">
              <i class="fa-solid" [ngClass]="info.icon"></i>
            </div>
            <div class="flex flex-col gap-0.5">
              <span class="text-xs text-text-muted uppercase tracking-[0.05em]">{{ info.label }}</span>
              <a *ngIf="info.href; else noLink" [href]="info.href"
                 (click)="info.label === 'Email' ? copyEmail(info.value, $event) : null"
                 class="text-sm text-text-secondary font-medium transition-colors duration-250 hover:text-accent-light">
                {{ info.value }}
              </a>
              <ng-template #noLink>
                <span class="text-sm text-text-secondary font-medium cursor-default">{{ info.value }}</span>
              </ng-template>
            </div>
          </div>
        </div>

        <div>
          <p class="text-sm text-text-muted mb-3">{{ t.t('contact.or_reach') }}</p>
          <div class="flex items-center gap-3">
            <a *ngFor="let s of socials" [href]="s.href"
               [target]="s.label === 'Email' ? '_self' : '_blank'"
               (click)="s.label === 'Email' ? copyEmail('nafiahmed318@gmail.com', $event) : null"
               [id]="'contact-' + s.label.toLowerCase()"
               class="flex items-center justify-center w-11 h-11 rounded-full text-text-secondary text-base transition-all duration-250 hover:-translate-y-0.5 hover:text-primary-light"
               style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07)"
               [attr.aria-label]="s.label">
              <i [class]="s.icon"></i>
            </a>

            <!-- Copied Indicator -->
            <span *ngIf="copied()" class="text-xs text-success font-semibold animate-fade-in flex items-center gap-1.5 px-3 py-1.5 rounded-lg"
                  style="background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2)">
              <i class="fa-solid fa-circle-check"></i>
              Copied!
            </span>
          </div>
        </div>
      </div>

      <!-- Form -->
      <div class="glass-card bg-bg-card p-8 reveal delay-2">
        <form class="flex flex-col gap-5" (ngSubmit)="onSubmit()" #contactForm="ngForm" id="contact-form">

          <div class="flex flex-col gap-2">
            <label for="contact-name" class="text-sm font-medium text-text-secondary">{{ t.t('contact.name_label') }}</label>
            <input id="contact-name" type="text" [(ngModel)]="name" name="name"
                   [placeholder]="'e.g. John Doe'" required
                   class="w-full px-4 py-3 rounded-xl text-sm text-text-primary font-sans transition-all duration-250 resize-y placeholder:text-text-muted focus:outline-none"
                   style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.07)"
                   onfocus="this.style.borderColor='rgba(99,102,241,0.5)'; this.style.background='rgba(99,102,241,0.05)'; this.style.boxShadow='0 0 0 3px rgba(99,102,241,0.1)'"
                   onblur="this.style.borderColor='rgba(255,255,255,0.07)'; this.style.background='rgba(0,0,0,0.2)'; this.style.boxShadow='none'" />
          </div>

          <div class="flex flex-col gap-2">
            <label for="contact-email" class="text-sm font-medium text-text-secondary">{{ t.t('contact.email_label') }}</label>
            <input id="contact-email" type="email" [(ngModel)]="email" name="email"
                   [placeholder]="'e.g. john@example.com'" required
                   class="w-full px-4 py-3 rounded-xl text-sm text-text-primary font-sans transition-all duration-250 placeholder:text-text-muted focus:outline-none"
                   style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.07)"
                   onfocus="this.style.borderColor='rgba(99,102,241,0.5)'; this.style.background='rgba(99,102,241,0.05)'; this.style.boxShadow='0 0 0 3px rgba(99,102,241,0.1)'"
                   onblur="this.style.borderColor='rgba(255,255,255,0.07)'; this.style.background='rgba(0,0,0,0.2)'; this.style.boxShadow='none'" />
          </div>

          <div class="flex flex-col gap-2">
            <label for="contact-message" class="text-sm font-medium text-text-secondary">{{ t.t('contact.message_label') }}</label>
            <textarea id="contact-message" [(ngModel)]="message" name="message" rows="5"
                      [placeholder]="'Your message...'" required
                      class="w-full px-4 py-3 rounded-xl text-sm text-text-primary font-sans transition-all duration-250 resize-y placeholder:text-text-muted focus:outline-none"
                      style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.07)"
                      onfocus="this.style.borderColor='rgba(99,102,241,0.5)'; this.style.background='rgba(99,102,241,0.05)'; this.style.boxShadow='0 0 0 3px rgba(99,102,241,0.1)'"
                      onblur="this.style.borderColor='rgba(255,255,255,0.07)'; this.style.background='rgba(0,0,0,0.2)'; this.style.boxShadow='none'"></textarea>
          </div>

          <button type="submit" id="btn-contact-submit"
                  class="btn-primary w-full justify-center py-4 text-base"
                  [disabled]="sending() || !contactForm.valid"
                  [class.opacity-60]="sending() || !contactForm.valid"
                  [class.cursor-not-allowed]="sending() || !contactForm.valid"
                  [class.hover:transform-none]="sending() || !contactForm.valid">
            <span *ngIf="!sending()">
              <i class="fa-solid fa-paper-plane"></i>
              {{ t.t('contact.send_btn') }}
            </span>
            <span *ngIf="sending()" class="flex items-center gap-2">
              <i class="fa-solid fa-spinner fa-spin"></i>
              {{ t.t('contact.sending') }}
            </span>
          </button>

          <div *ngIf="success()"
               class="flex items-center gap-3 p-4 rounded-xl text-success text-sm font-medium animate-fade-up"
               style="background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25)">
            <i class="fa-solid fa-circle-check"></i>
            {{ t.t('contact.success_msg') }}
          </div>

        </form>
      </div>

    </div>
  </div>
</section>
