<section class="py-24 relative" style="background: var(--bg-base)">
  <div class="w-full max-w-[1200px] mx-auto px-6 lg:px-8">

    <div class="text-center mb-12 reveal">
      <span class="label-tag-primary">{{ t.t('projects.section_label') }}</span>
      <h2 class="gradient-text font-extrabold mt-4 mb-3" style="font-size: clamp(1.875rem, 4vw, 2.25rem)">
        {{ t.t('projects.title') }}
      </h2>
      <p class="text-text-secondary max-w-[540px] mx-auto">{{ t.t('projects.subtitle') }}</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">
      <div *ngFor="let project of projects; let i = index"
           class="glass-card bg-bg-card p-6 flex flex-col gap-4 relative overflow-hidden reveal group"
           [class]="'delay-' + ((i % 4) + 1)"
           [style.--accent-color]="project.color">

        <!-- Top accent line on hover -->
        <div class="absolute top-0 left-0 right-0 h-0.5 opacity-0 group-hover:opacity-100 transition-opacity duration-250"
             [style.background]="'linear-gradient(90deg, transparent, ' + project.color + ', transparent)'"></div>

        <!-- Top row: icon + links -->
        <div class="flex items-start justify-between">
          <div class="flex items-center justify-center w-[52px] h-[52px] rounded-xl text-2xl transition-transform duration-250 group-hover:scale-110 group-hover:-rotate-[5deg]"
               [style.background]="'rgba(' + hexToRgb(project.color) + ', 0.12)'">
            <i class="fa-solid" [ngClass]="project.icon" [style.color]="project.color"></i>
          </div>
          <div class="flex gap-2" *ngIf="project.github || project.link">
            <a *ngIf="project.github" [href]="project.github" target="_blank" aria-label="GitHub"
               class="flex items-center justify-center w-8 h-8 rounded-full text-text-muted text-sm transition-all duration-250 hover:text-text-primary hover:border-primary/40 hover:bg-primary/10"
               style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07)">
              <i class="fa-brands fa-github"></i>
            </a>
            <a *ngIf="project.link" [href]="project.link" target="_blank" aria-label="Live"
               class="flex items-center justify-center w-8 h-8 rounded-full text-text-muted text-sm transition-all duration-250 hover:text-text-primary hover:border-primary/40 hover:bg-primary/10"
               style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07)">
              <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </a>
          </div>
        </div>

        <!-- Project Badges (Category & Type) -->
        <div class="flex items-center gap-1.5 -mt-1">
          <span class="px-2 py-0.5 rounded text-[10px] font-semibold uppercase tracking-wider"
                [style.background]="project.category === 'office' ? 'rgba(99, 102, 241, 0.12)' : 'rgba(16, 185, 129, 0.12)'"
                [style.color]="project.category === 'office' ? '#818cf8' : '#34d399'">
            {{ project.category === 'office' ? 'Office' : 'Personal' }}
          </span>
          <span class="px-2 py-0.5 rounded text-[10px] font-medium tracking-wide"
                style="background: rgba(255, 255, 255, 0.05); color: #94a3b8">
            {{ project.type }}
          </span>
        </div>

        <h3 class="text-lg font-bold text-text-primary">{{ project.name }}</h3>
        <p class="text-sm text-text-secondary leading-[1.7] flex-1">{{ project.description }}</p>

        <p class="text-xs text-text-muted flex items-start gap-2 leading-[1.6] p-3 rounded-xl"
           style="background: rgba(255,255,255,0.03); border-left: 2px solid rgba(6,182,212,0.4)">
          <i class="fa-solid fa-lightbulb text-accent flex-shrink-0 mt-0.5"></i>
          {{ project.highlights }}
        </p>

        <div class="flex flex-wrap gap-2 mt-auto">
          <span *ngFor="let tech of project.tech" class="tech-badge">{{ tech }}</span>
        </div>
      </div>
    </div>

  </div>
</section>
